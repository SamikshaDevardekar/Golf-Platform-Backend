spring.application.name=golfplatform
server.port=${GOLF_PLATFORM_SERVICE_PORT:6060}
server.forward-headers-strategy=framework

spring.datasource.url=jdbc:postgresql://${RENDER_SERVER_HOST}:${RENDER_SERVER_DB_PORT}/${GOLF_PLATFORM_DB_NAME}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.username=${RENDER_SERVER_USERNAME}
spring.datasource.password=${RENDER_SERVER_PASSWORD}
spring.web.resources.static-locations=classpath:/static/
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false


app.jwt.secret=${JWT_SECRET:change-this-dev-secret-change-this-dev-secret}
app.jwt.expiration-ms=86400000
app.cors.allowed-origins=*

stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
